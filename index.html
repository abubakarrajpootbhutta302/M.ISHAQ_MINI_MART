<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Mart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛒 Mini Mart</h1>
  </header>

  <!-- CART BOX -->
  <div id="cartBox">
    <h2>🛒 Cart Items</h2>
    <ul id="cartList"></ul>
  </div>

  <!-- PRODUCTS -->
  <section class="products">

    <div class="card">
      <h3>Rice 1KG</h3>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <h3>Sugar 1KG</h3>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <h3>Oil 1L</h3>
      <button>Add to Cart</button>
    </div>

  </section>

  <!-- JS LINK (IMPORTANT) -->
  <script src="script.js"></script>

</body>
</html>
