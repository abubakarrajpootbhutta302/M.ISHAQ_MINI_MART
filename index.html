<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Mart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛒 Mini Mart</h1>
    <p>Fresh groceries & daily essentials</p>
  </header>
<div id="cartBox">
  <h2>🛒 Cart Items</h2>
  <ul id="cartList"></ul>
</div>
  <section class="products">

    <div class="card">
      <h3>Rice 1KG</h3>
      <p>Price: 250 PKR</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <h3>Sugar 1KG</h3>
      <p>Price: 200 PKR</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <h3>Oil 1L</h3>
      <p>Price: 500 PKR</p>
      <button>Add to Cart</button>
    </div>

  </section>

  <footer>
    <p>© 2026 Mini Mart | Built by You</p>
  </footer>

</body>
</html>
<script src="script.js"></script>
